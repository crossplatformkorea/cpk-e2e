name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  # Allow cpk-ui to trigger this workflow
  repository_dispatch:
    types: [cpk-ui-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install

      - name: Type check & build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Clone cpk-ui and get its commit hash for cache key
      - name: Clone cpk-ui
        run: git clone --depth 1 https://github.com/crossplatformkorea/cpk-ui.git ../cpk-ui

      - name: Get cpk-ui commit hash
        id: cpk-ui-hash
        run: echo "hash=$(cd ../cpk-ui && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache cpk-ui node_modules
        uses: actions/cache@v4
        with:
          path: ../cpk-ui/node_modules
          key: cpk-ui-deps-${{ steps.cpk-ui-hash.outputs.hash }}
          restore-keys: cpk-ui-deps-

      - name: Install cpk-ui dependencies
        run: cd ../cpk-ui && bun install

      - name: Cache Storybook build
        uses: actions/cache@v4
        with:
          path: ../cpk-ui/storybook-static
          key: storybook-${{ steps.cpk-ui-hash.outputs.hash }}
          restore-keys: storybook-

      - name: Build cpk-ui Storybook
        run: |
          if [ ! -f ../cpk-ui/storybook-static/index.json ]; then
            cd ../cpk-ui && CI=1 STORYBOOK=1 npx storybook build -o storybook-static
          else
            echo "Using cached Storybook build"
          fi

      - name: Discover components
        run: bun run discover

      - name: Check story coverage
        run: bun run check-coverage || true

      - name: Run E2E tests
        run: bun run test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 14
