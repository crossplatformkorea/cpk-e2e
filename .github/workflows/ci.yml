name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Clone cpk-ui for testing
      - name: Clone cpk-ui
        run: git clone --depth 1 https://github.com/crossplatformkorea/cpk-ui.git ../cpk-ui

      - name: Install cpk-ui dependencies
        run: cd ../cpk-ui && bun install

      - name: Build cpk-ui Storybook
        run: cd ../cpk-ui && CI=1 STORYBOOK=1 npx storybook build -o storybook-static

      - name: Discover components
        run: bun run discover

      - name: Check story coverage
        run: bun run check-coverage || true

      - name: Run E2E tests
        run: bun run test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 14
